name: Sync Changelog

# Runs whenever CHANGELOG.md is updated on main, or triggered manually.
# Parses CHANGELOG.md → changelog.json, commits the result, then dispatches
# a repository_dispatch event to the docs site to trigger a rebuild.
on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-changelog:
    name: Parse & commit changelog.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Derive package metadata
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")"      >> "$GITHUB_OUTPUT"
          echo "name=$(node -p "require('./package.json').name")"            >> "$GITHUB_OUTPUT"
          echo "description=$(node -p "require('./package.json').description")" >> "$GITHUB_OUTPUT"

      - name: Parse CHANGELOG.md → changelog.json
        run: |
          node - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const CATEGORY_MAP = {
            added:'added', changed:'changed', deprecated:'deprecated',
            removed:'removed', fixed:'fixed', security:'security', documentation:'documentation',
          };

          function parse(content, meta) {
            const lines = content.split(/\r?\n/);
            const entries = [];
            let ver = null, date = null, changes = {}, cat = null;

            const flush = () => {
              if (ver && ver !== 'Unreleased' && date) entries.push({ version: ver, date, changes });
            };

            for (const line of lines) {
              const vm = line.match(/^## \[([^\]]+)\](?:\s*-\s*(\d{4}-\d{2}-\d{2}))?/);
              if (vm) { flush(); ver = vm[1]; date = vm[2] ?? null; changes = {}; cat = null; continue; }
              const cm = line.match(/^### (.+)/);
              if (cm) { cat = CATEGORY_MAP[cm[1].trim().toLowerCase()] ?? null; continue; }
              if (cat && /^[-*]\s+/.test(line)) {
                const t = line.replace(/^[-*]\s+/, '').trim();
                if (t) (changes[cat] ??= []).push(t);
              }
            }
            flush();
            return { ...meta, entries };
          }

          const content = readFileSync('CHANGELOG.md', 'utf-8');
          const pkg     = JSON.parse(readFileSync('package.json', 'utf-8'));
          const cl      = parse(content, { package: pkg.name, name: 'Gallery', description: pkg.description });
          writeFileSync('changelog.json', JSON.stringify({ $schema: './changelog.schema.json', ...cl }, null, 2));
          console.log('Generated changelog.json with', cl.entries.length, 'entries');
          EOF

      - name: Commit changelog.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync changelog.json from CHANGELOG.md [skip ci]"
            git push
          fi

      # Notify the docs site to rebuild so the changelog page stays fresh.
      - name: Dispatch docs rebuild
        if: ${{ secrets.DOCS_DISPATCH_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token:      ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: angularforge/angularforge
          event-type: changelog-updated
          client-payload: |
            {
              "package": "${{ steps.meta.outputs.name }}",
              "version": "${{ steps.meta.outputs.version }}"
            }

  generate-release-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    needs: sync-changelog
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract notes for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Update GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --notes "${{ steps.notes.outputs.notes }}"
