name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Chrome (for headless Karma)
        uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the release tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) no coincide con el tag del release ($TAG)."
            exit 1
          fi

      - name: Test
        run: npm test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

      - name: Build library
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
